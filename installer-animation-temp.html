<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Request+ Installer GIF Export</title>
  <style>
    :root {
      color-scheme: dark;
      --slate-950: #020617;
      --slate-900: #0f172a;
      --slate-800: #1e293b;
      --purple-500: #a855f7;
      --purple-600: #9333ea;
      --green-500: #22c55e;
      --text: #f8fafc;
      --muted: #cbd5e1;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--slate-950);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .export-panel {
      position: fixed;
      left: 50%;
      bottom: 22px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 320px;
      transform: translateX(-50%);
      padding: 12px 14px;
      color: var(--text);
      background: rgba(15, 23, 42, 0.82);
      border: 1px solid rgba(168, 85, 247, 0.32);
      border-radius: 10px;
      box-shadow: 0 18px 54px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(14px);
    }

    button,
    a.download-link {
      appearance: none;
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      color: white;
      font: 700 13px Inter, ui-sans-serif, system-ui, sans-serif;
      text-decoration: none;
      background: linear-gradient(90deg, var(--purple-600), var(--green-500));
      cursor: pointer;
      box-shadow: 0 10px 28px rgba(147, 51, 234, 0.25);
    }

    button:disabled {
      cursor: wait;
      opacity: 0.55;
    }

    .status {
      flex: 1;
      min-width: 0;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .download-link[hidden] {
      display: none;
    }
  </style>
</head>

      greenGlow.addColorStop(0, `rgba(34, 197, 94, ${0.2 + Math.cos(a * 1.1) * 0.04})`);
      greenGlow.addColorStop(0.48, "rgba(34, 197, 94, 0.08)");
      greenGlow.addColorStop(1, "rgba(2, 6, 23, 0)");
      target.fillStyle = greenGlow;
      target.fillRect(0, 0, w, h);
    }

    function drawLogo(target, cx, cy, size, t) {
      const pulse = 1 + Math.sin(t * 0.004) * 0.035;
      target.save();
      target.translate(cx, cy);
      target.scale(pulse, pulse);

      const glow = target.createRadialGradient(0, 0, 10, 0, 0, size * 0.72);
      glow.addColorStop(0, "rgba(168, 85, 247, 0.44)");
      glow.addColorStop(0.55, "rgba(34, 197, 94, 0.2)");
      glow.addColorStop(1, "rgba(34, 197, 94, 0)");
      target.fillStyle = glow;
      target.beginPath();
      target.arc(0, 0, size * 0.72, 0, Math.PI * 2);
      target.fill();

      const logoSize = size;
      if (logo.complete && logo.naturalWidth > 0) {
        target.drawImage(logo, -logoSize / 2, -logoSize / 2, logoSize, logoSize);
      } else {
        const fallback = target.createLinearGradient(-logoSize / 2, -logoSize / 2, logoSize / 2, logoSize / 2);
        fallback.addColorStop(0, colors.purple);
        fallback.addColorStop(1, colors.green);
        roundRect(target, -logoSize / 2, -logoSize / 2, logoSize, logoSize, logoSize * 0.22);
        target.fillStyle = fallback;
        target.fill();
        target.fillStyle = colors.text;
        target.font = `800 ${Math.floor(logoSize * 0.42)}px Inter, sans-serif`;
        target.textAlign = "center";
        target.textBaseline = "middle";
        target.fillText("R+", 0, 2);
      }

      target.restore();
    }

    function drawSpinner(target, cx, cy, radius, t) {
      const spinProgress = Math.min(t / SPIN_DURATION, 1);
      const rotation = spinProgress * Math.PI * 2;
      target.save();
      target.translate(cx, cy);
      target.rotate(rotation);
      target.lineWidth = 8;
      target.lineCap = "round";

      for (let i = 0; i < 10; i++) {
        const alpha = 0.16 + (i / 10) * 0.72;
        const start = (Math.PI * 2 / 10) * i;
        const end = start + 0.27;
        const mix = i / 9;
        target.strokeStyle = mix < 0.52
          ? `rgba(168, 85, 247, ${alpha})`
          : `rgba(34, 197, 94, ${alpha})`;
        target.beginPath();
        target.arc(0, 0, radius, start, end);
        target.stroke();
      }

      target.restore();
    }

    function drawFrame(target, w, h, t, exportMode = false) {
      drawBackground(target, w, h, t);

      const panelW = Math.min(470, w - 52);
      const panelH = 430;
      const panelX = (w - panelW) / 2;
      const panelY = (h - panelH) / 2;

      target.shadowColor = "rgba(0, 0, 0, 0.48)";
      target.shadowBlur = 34;
      roundRect(target, panelX, panelY, panelW, panelH, 18);
      target.fillStyle = colors.panel;
      target.fill();
      target.shadowBlur = 0;
      target.strokeStyle = colors.stroke;
      target.lineWidth = 1;
      target.stroke();

      drawLogo(target, w / 2, panelY + 108, 112, t);

      target.textAlign = "center";
      target.textBaseline = "middle";
      target.fillStyle = colors.text;
      target.font = "800 46px Inter, ui-sans-serif, system-ui, sans-serif";
      target.fillText("Request+", w / 2, panelY + 205);

      target.fillStyle = colors.muted;
      target.font = "600 18px Inter, ui-sans-serif, system-ui, sans-serif";
      const dots = ".".repeat((Math.floor(t / 420) % 3) + 1);
      target.fillText(`Installing${dots}`, w / 2, panelY + 246);

      drawSpinner(target, w / 2, panelY + 311, 34, t);

      target.fillStyle = "rgba(203, 213, 225, 0.82)";
      target.font = "600 13px Inter, ui-sans-serif, system-ui, sans-serif";
      target.fillText("Setting up chat requests, music controls, and overlays", w / 2, panelY + 374);

      if (!exportMode) {
        target.fillStyle = "rgba(248, 250, 252, 0.42)";
        target.font = "500 11px Inter, ui-sans-serif, system-ui, sans-serif";
        target.fillText("Use Render GIF below to generate a saveable installer animation", w / 2, h - 78);
      }
    }

    let previewStart = null;
    function animate(t) {
      if (previewStart === null) previewStart = t;
      const elapsed = Math.min(t - previewStart, SPIN_DURATION);
      drawFrame(ctx, window.innerWidth, window.innerHeight, elapsed);
      if (elapsed < SPIN_DURATION) {
        requestAnimationFrame(animate);
      }
    }

    async function ensureGifLibrary() {
      if (window.GIF) return true;
      statusText.textContent = "GIF library did not load. Check internet access, then reload this file.";
      return false;
    }

    async function getGifWorkerScript() {
      if (gifWorkerObjectUrl) return gifWorkerObjectUrl;

      statusText.textContent = "Preparing GIF encoder...";
      const response = await fetch(GIF_WORKER_URL, { cache: "force-cache" });
      if (!response.ok) {
        throw new Error(`Could not load GIF worker (${response.status})`);
      }

      const workerSource = await response.text();
      gifWorkerObjectUrl = URL.createObjectURL(new Blob([workerSource], {
        type: "application/javascript"
      }));
      return gifWorkerObjectUrl;
    }

    async function exportGif() {
      if (!(await ensureGifLibrary())) return;

      exportButton.disabled = true;
      downloadLink.hidden = true;

      let workerScript;
      try {
        workerScript = await getGifWorkerScript();
      } catch (error) {
        statusText.textContent = "Could not prepare the GIF encoder. Check internet access, then reload this file.";
        console.error(error);
        exportButton.disabled = false;
        return;
      }

      statusText.textContent = "Rendering GIF frames...";

      const size = 640;
      const frameDelay = 1000 / EXPORT_FPS;
      const frameCount = Math.round(SPIN_DURATION / frameDelay) + 1;
      const offscreen = document.createElement("canvas");
      offscreen.width = size;
      offscreen.height = size;
      const offCtx = offscreen.getContext("2d", { willReadFrequently: true });

      const gif = new GIF({
        workers: 2,
        quality: 10,
        width: size,
        height: size,
        workerScript
      });

      for (let i = 0; i < frameCount; i++) {
        drawFrame(offCtx, size, size, Math.min(i * frameDelay, SPIN_DURATION), true);
        gif.addFrame(offCtx, { copy: true, delay: frameDelay });
        statusText.textContent = `Rendering GIF frames... ${i + 1}/${frameCount}`;
        await new Promise((resolve) => setTimeout(resolve, 0));
      }

      gif.on("progress", (progress) => {
        statusText.textContent = `Encoding GIF... ${Math.round(progress * 100)}%`;
      });

      gif.on("finished", (blob) => {
        const url = URL.createObjectURL(blob);
        downloadLink.href = url;
        downloadLink.hidden = false;
        statusText.textContent = "GIF ready. Click Save GIF.";
        exportButton.disabled = false;
      });

      gif.render();
    }

    exportButton.addEventListener("click", exportGif);
    logo.onload = () => drawFrame(ctx, window.innerWidth, window.innerHeight, performance.now());
    requestAnimationFrame(animate);
  </script>
</body>
</html>
